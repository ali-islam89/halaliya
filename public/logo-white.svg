<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- ダーク背景用（白抜き版）-->
  <defs>
    <linearGradient id="goldGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#C8961E"/>
    </linearGradient>
  </defs>

  <!-- シンボルマーク -->
  <g transform="translate(4,4) scale(0.9)">
    <circle cx="40" cy="40" r="38" fill="url(#goldGradW)"/>
    <circle cx="40" cy="40" r="34.5" fill="rgba(255,255,255,0.15)"/>
    <circle cx="40" cy="40" r="34.5" fill="none" stroke="white" stroke-width="2"/>

    <g transform="translate(40,40)">
      <path d="
        M -1.5,-17.5
        A 17.5,17.5 0 1,1 -1.5,17.5
        A 12.5,12.5 0 1,0 -1.5,-17.5
        Z
      " fill="white" transform="rotate(-20)"/>
      <g transform="translate(11,0) rotate(-20)">
        <polygon
          points="0,-5.5 1.3,-1.7 5.2,-1.7 2.1,0.7 3.4,4.4 0,2 -3.4,4.4 -2.1,0.7 -5.2,-1.7 -1.3,-1.7"
          fill="white"
        />
      </g>
    </g>

    <g transform="translate(58,58) scale(0.45)" opacity="0.85">
      <ellipse cx="0" cy="-8" rx="4" ry="6" fill="rgba(255,255,255,0.8)" transform="rotate(0)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="6" fill="rgba(255,255,255,0.8)" transform="rotate(72)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="6" fill="rgba(255,255,255,0.8)" transform="rotate(144)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="6" fill="rgba(255,255,255,0.8)" transform="rotate(216)"/>
      <ellipse cx="0" cy="-8" rx="4" ry="6" fill="rgba(255,255,255,0.8)" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="3" fill="#C8961E"/>
    </g>
  </g>

  <!-- テキスト（白） -->
  <text x="92" y="32" font-family="Georgia, serif" font-size="26" font-weight="bold"
        letter-spacing="2" fill="white">Halaliya</text>
  <line x1="92" y1="36" x2="310" y2="36" stroke="#C8961E" stroke-width="1.2" opacity="0.8"/>
  <text x="94" y="56" font-family="'Yu Mincho', serif" font-size="18"
        letter-spacing="4" fill="white">ハラール屋</text>
  <text x="94" y="72" font-family="Georgia, serif" font-size="11"
        letter-spacing="1" fill="#C8961E" opacity="0.9">halaliya.com</text>
</svg>
